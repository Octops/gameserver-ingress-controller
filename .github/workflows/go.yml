name: Go

on:
  push:
#  pull_request:
    #branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.1

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
